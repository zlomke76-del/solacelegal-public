<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Simple Maritime Flag</title>
  <desc id="desc">A simple navy maritime flag with a white hoist stripe, two gold grommets, and a centered white anchor.</desc>

  <rect width="1600" height="1000" fill="#ffffff"/>

  <!-- Flag field -->
  <rect x="80" y="80" width="1440" height="840" fill="#062654" stroke="#031a3a" stroke-width="8"/>

  <!-- Hoist stripe -->
  <rect x="80" y="80" width="80" height="840" fill="#f7f7f5" stroke="#031a3a" stroke-width="4"/>

  <!-- Grommets -->
  <circle cx="120" cy="125" r="22" fill="none" stroke="#c79a3b" stroke-width="12"/>
  <circle cx="120" cy="875" r="22" fill="none" stroke="#c79a3b" stroke-width="12"/>

  <!-- Anchor symbol -->
  <g transform="translate(820 500)" fill="#ffffff">
    <!-- ring -->
    <circle cx="0" cy="-250" r="72"/>
    <circle cx="0" cy="-250" r="36" fill="#062654"/>

    <!-- shank -->
    <rect x="-30" y="-190" width="60" height="360" rx="14"/>

    <!-- stock -->
    <rect x="-150" y="-140" width="300" height="40" rx="12"/>

    <!-- crown / lower point -->
    <path d="M-45 170 L0 245 L45 170 Z"/>

    <!-- left arm -->
    <path d="M-30 130
             C-95 132 -155 88 -190 25
             L-222 65
             C-235 5 -226 -55 -202 -105
             L-125 10
             L-178 20
             C-146 82 -97 115 -30 118 Z"/>

    <!-- right arm -->
    <path d="M30 130
             C95 132 155 88 190 25
             L222 65
             C235 5 226 -55 202 -105
             L125 10
             L178 20
             C146 82 97 115 30 118 Z"/>
  </g>
</svg>
